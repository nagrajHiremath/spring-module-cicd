spring:
  application:
    name: assignment

  datasource:
    url: jdbc:postgresql://${DB_URL}:5432/postgres_aws
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
